name: Sync GitHub Repos

on:
  schedule:
    # Run every day at 02:00 UTC (09:00 WIB)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  update-repos:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit repos_data.json back to repo

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          # GitHub Actions secret → TOKEN_CLASS
          # Set this secret in: Settings → Secrets and variables → Actions → New repository secret
          # Name: TOKEN_CLASS  |  Value: your classic GitHub token (ghp_xxx...)
          TOKEN_CLASS: ${{ secrets.TOKEN_CLASS }}
        run: python update_repos.py

      - name: Commit updated repos_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos_data.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: auto-sync repos_data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
